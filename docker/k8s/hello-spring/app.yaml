apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hello-spring
  name: hello-spring
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: hello-spring
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: hello-spring
    spec:
      containers:
      - image: devdatir/hello-spring
        imagePullPolicy: Always
        name: hello-spring
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
 
---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: hello-spring
  name: hello-spring
  namespace: default
spec:
  ports:
  - nodePort: 30007
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: hello-spring
  type: NodePort
