apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: service-b
  name: service-b
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: service-b
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - image: embarkx/tax-service-b
        imagePullPolicy: Always
        name: tax-service-b
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File

        ports:
        - containerPort: 4000

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
 
---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: service-b
  name: service-b
  namespace: default
spec:
  ports:
  - port: 4000
    protocol: TCP
    targetPort: 4000
  selector:
    app: service-b
  type: ClusterIP
