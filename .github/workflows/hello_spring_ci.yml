name: Hello Spring CI
on:
    push

jobs:
    buildAndTest:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Set up java
              uses: actions/setup-java@v5
              with:
                java-version: '21'
                distribution: 'temurin'

            - name: Build with Maven
              working-directory: docker/app1-hello/springboot/hello-spring
              run: mvn -b 

            - name: upload test reports
              uses: actions/upload-artifact@v7
              with:
                name: test-reports
                path : docker/app1-hello/springboot/hello-spring/target/surefire-reports

    dockerBuildPush:
        runs-on: ubuntu-latest
        needs: buildAndTest
        steps:
            - uses: actions/checkout@v6

            - name: Set up java
              uses: actions/setup-java@v5
              with:
                java-version: '21'
                distribution: 'temurin'

            - name: Build JAR for docker image
              working-directory: docker/app1-hello/springboot/hello-spring
              run: mvn -b package -DskipTests

            - name: login to docker hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push docker image
              uses: docker/build-push-action@v7
              with:
                context: docker/app1-hello/springboot/hello-spring
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/hello-spring:latest